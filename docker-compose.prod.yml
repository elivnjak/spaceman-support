# Production: app + Postgres (pgvector) + persistent storage
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.production
    environment:
      DATABASE_URL: postgres://rag:${POSTGRES_PASSWORD:-changeme}@db:5432/rag
      STORAGE_PATH: /app/storage
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  app_storage:
